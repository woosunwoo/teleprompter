<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teleprompter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="title">Teleprompter</div>
          <div class="subtitle">Mirror, font size, and smooth scrolling</div>
        </div>

        <div class="controls">
          <div class="control-group">
            <button id="toggleScrollBtn" class="btn primary" type="button">Start</button>
            <button id="resetBtn" class="btn" type="button">Reset</button>
          </div>

          <div class="control-group">
            <div class="label">Preset</div>
            <select id="orientationPreset" class="select">
              <option value="default">Default</option>
              <option value="diy45">DIY 45° Glass</option>
              <option value="custom">Custom</option>
            </select>
          </div>

          <div class="control-group">
            <div class="label">Orientation</div>
            <label class="toggle">
              <input id="flipXToggle" type="checkbox" />
              <span>Flip X</span>
            </label>
            <label class="toggle">
              <input id="flipYToggle" type="checkbox" />
              <span>Flip Y</span>
            </label>
            <label class="toggle">
              <input id="rotateToggle" type="checkbox" />
              <span>Rotate 180°</span>
            </label>
            <button id="recalibrateBtn" class="btn" type="button">Recalibrate</button>
          </div>

          <div class="control-group">
            <div class="label">Font</div>
            <div class="stack">
              <div class="row">
                <button id="fontDecBtn" class="btn" type="button">A-</button>
                <input id="fontSizeRange" class="range" type="range" min="18" max="120" step="1" />
                <button id="fontIncBtn" class="btn" type="button">A+</button>
              </div>
              <div class="hint"><span id="fontSizeValue"></span> px</div>
            </div>
          </div>

          <div class="control-group">
            <div class="label">Speed</div>
            <div class="stack">
              <div class="row">
                <input id="speedRange" class="range" type="range" min="0" max="300" step="1" />
              </div>
              <div class="hint"><span id="speedValue"></span> px/s</div>
            </div>
          </div>

          <div class="control-group">
            <div class="label">View</div>
            <div class="row">
              <button id="prompterOnlyBtn" class="btn" type="button">Prompter Only</button>
              <button id="enterFullscreenBtn" class="btn" type="button">Fullscreen</button>
              <button id="swapPanelsBtn" class="btn" type="button">Swap</button>
            </div>
          </div>
        </div>
      </header>

      <main class="content">
        <section id="editorPanel" class="panel editor">
          <div class="panel-header">
            <div class="panel-title">Script</div>
            <div class="panel-actions">
              <button id="clearBtn" class="btn" type="button">Clear</button>
              <button id="loadSampleBtn" class="btn" type="button">Sample</button>
              <button id="loadCalibScriptBtn" class="btn" type="button">Load Test</button>
            </div>
          </div>
          <textarea id="scriptInput" class="textarea" spellcheck="false" placeholder="Paste or type your script here..."></textarea>
        </section>

        <section id="prompterPanel" class="panel prompter">
          <div class="panel-header">
            <div class="panel-title">Prompter</div>
            <div class="panel-actions">
              <div class="pill">Space = Start/Stop</div>
              <div class="pill">R = Reset</div>
            </div>
          </div>

          <div id="viewport" class="viewport" tabindex="0">
            <div id="calibrationCard" class="calibration-card" hidden>
              <div class="calibration-title">Calibration</div>
              <div class="calibration-copy">Look through the glass. Which line is at the top?</div>
              <div class="calibration-grid">
                <button id="calibTopIs1Btn" class="btn" type="button">Top is LINE 1</button>
                <button id="calibTopIs3Btn" class="btn" type="button">Top is LINE 3</button>
                <button id="calibMotionUpBtn" class="btn" type="button">Motion looks UP</button>
                <button id="calibMotionDownBtn" class="btn" type="button">Motion looks DOWN</button>
                <button id="calibReadNormalBtn" class="btn" type="button">Text reads normal</button>
                <button id="calibReadBackwardBtn" class="btn" type="button">Text reads backward</button>
              </div>
              <div id="calibStatus" class="calibration-status">Step 1/2: choose top line.</div>
              <div class="calibration-actions">
                <button id="calibScrollBtn" class="btn" type="button">Start</button>
                <button id="applyCalibrationBtn" class="btn primary" type="button" disabled>Apply Calibration</button>
                <button id="cancelCalibrationBtn" class="btn" type="button">Cancel</button>
              </div>
            </div>

            <div id="prompterOverlay" class="prompter-overlay" aria-hidden="true">
              <button id="overlayExitBtn" class="overlay-btn" type="button" aria-label="Exit Prompter Only">X</button>
              <button id="overlayToggleBtn" class="overlay-btn" type="button">Hide</button>
              <div class="overlay-spacer"></div>
              <button id="overlayScrollBtn" class="overlay-btn overlay-primary" type="button">Start</button>
              <button id="overlayResetBtn" class="overlay-btn" type="button">Reset</button>
              <button id="overlayFullscreenBtn" class="overlay-btn" type="button">Fullscreen</button>
            </div>
            <div id="inner" class="inner">
              <div id="scriptDisplay" class="script-display"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
